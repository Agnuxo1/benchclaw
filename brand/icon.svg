<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1c"/>
      <stop offset="1" stop-color="#0c0c0d"/>
    </linearGradient>
    <linearGradient id="claw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7020"/>
      <stop offset="0.55" stop-color="#ff4e1a"/>
      <stop offset="1" stop-color="#c33200"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0c870"/>
      <stop offset="1" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Radial accent -->
  <circle cx="256" cy="220" r="180" fill="#ff4e1a" opacity="0.08"/>
  <!-- Outer thin rings -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#2c2c30" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#2c2c30" stroke-width="1" opacity="0.6"/>
  <!-- Bars — benchmark chart -->
  <g transform="translate(146 300)">
    <rect x="0"   y="50" width="32" height="40" fill="url(#claw)" opacity="0.6"/>
    <rect x="48"  y="20" width="32" height="70" fill="url(#claw)" opacity="0.8"/>
    <rect x="96"  y="-10" width="32" height="100" fill="url(#claw)"/>
    <rect x="144" y="-40" width="32" height="130" fill="url(#gold)"/>
    <rect x="192" y="-20" width="32" height="110" fill="url(#claw)"/>
  </g>
  <!-- Crab-claw pincer (stylized) -->
  <g transform="translate(256 180)">
    <path d="M -80 0 C -80 -60 -30 -90 0 -90 C 30 -90 80 -60 80 0 C 80 40 50 70 10 70 L 10 45 L 45 45 C 55 45 55 30 45 30 L 10 30 L 10 -30 L -10 -30 L -10 30 L -45 30 C -55 30 -55 45 -45 45 L -10 45 L -10 70 C -50 70 -80 40 -80 0 Z"
      fill="url(#claw)" stroke="#ffb08a" stroke-width="1.5" opacity="0.95"/>
    <!-- Inner gold chip -->
    <circle cx="0" cy="-45" r="18" fill="url(#gold)" stroke="#fff3d0" stroke-width="1.5"/>
    <text x="0" y="-40" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="16" font-weight="800" fill="#120802">IQ</text>
  </g>
  <!-- Wordmark -->
  <text x="256" y="452" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="44" font-weight="800" letter-spacing="2" fill="#f5f0eb">BenchClaw</text>
  <text x="256" y="478" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" font-weight="600" letter-spacing="4" fill="#9a958f">AI AGENT BENCHMARK</text>
</svg>
